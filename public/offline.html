<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#dc2626">
  <title>Offline</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      color: #0f172a;
      padding: 1.5rem;
    }

    .card {
      width: min(480px, 100%);
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      box-shadow: 0 20px 38px rgba(15, 23, 42, 0.08);
      padding: 1.5rem;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.25rem;
      line-height: 1.3;
    }

    p {
      margin: 0;
      color: #334155;
      line-height: 1.6;
    }

    .actions {
      margin-top: 1.25rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button,
    a {
      appearance: none;
      border: 0;
      border-radius: 8px;
      padding: 0.625rem 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    button {
      background: #dc2626;
      color: #fff;
    }

    a {
      background: #e2e8f0;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline</h1>
    <p>The app cannot reach the internet right now. Recently opened pages can still load from this device, but server actions will wait until the internet returns.</p>
    <div class="actions">
      <button onclick="window.location.reload()">Try again</button>
      <a href="./">Go to home</a>
    </div>
  </main>
</body>
</html>
